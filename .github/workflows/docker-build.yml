name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  # 未配置 secrets 时只构建不推送
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || '' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME || 'dingtalk-attendance-bot' }}/dingtalk-attendance-bot
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ⚠️ 提示配置 Docker Hub 凭据
        if: env.DOCKER_USERNAME == ''
        run: |
          echo "::notice title=Docker 未推送::未配置 DOCKER_USERNAME/DOCKER_PASSWORD，镜像仅本地构建"
          echo "请在仓库 Settings → Secrets and variables → Actions 中添加："
          echo "  DOCKER_USERNAME - Docker Hub 用户名"
          echo "  DOCKER_PASSWORD - Docker Hub 密码或 Access Token"
